summary: MySQL mysqlshow CLI tests

execute: |
  echo "Testing mysqlshow"

  set -e

  PASS=$(grep MY-010454 /var/snap/mysql/current/log/error.log | awk '{ print $NF }')
  CMD="sudo mysql -u root --password=${PASS}"
  CMD_SHOW="sudo mysql.mysqlshow -u root --password=${PASS}"

  echo "Creating test db"
  ${CMD} -e "CREATE DATABASE test_db;"
  ${CMD} -e "USE test_db; CREATE TABLE test_table (id INT PRIMARY KEY, mycolumn VARCHAR(50));"

  ${CMD_SHOW} test_db test_table mycolumn | grep mycolumn

  ${CMD} -e "DROP DATABASE test_db;"
