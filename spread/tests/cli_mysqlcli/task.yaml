summary: MySQL mysql CLI tests

execute: |
  echo "Testing mysql cli"

  set -e

  PASS=$(grep MY-010454 /var/snap/mysql/current/log/error.log | awk '{ print $NF }')
  CMD="mysql -u root --password=\"${PASS}\""

  echo "Testing basic DML/DDL statments"
  ${CMD} -e "SHOW DATABASES;"
  ${CMD} -e "CREATE DATABASE test_db;"
  ${CMD} -e "USE test_db; CREATE TABLE test_table (id INT PRIMARY KEY, name VARCHAR(50));"
  ${CMD} -e "INSERT INTO test_db.test_table (id, name) VALUES (1, 'test_name');"
  RESULT=$(${CMD} -e "SELECT * FROM test_db.test_table WHERE id=1;" | grep test_name || true)
  ${CMD} -e "DROP DATABASE test_db;"

  echo "Testing SSL connection"
  ${CMD} --ssl-mode=REQUIRED -e "SHOW SESSION STATUS LIKE 'ssl_cipher';" |grep -q TLS
