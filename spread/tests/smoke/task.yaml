summary: MySQL SNAP smoke tests

execute: |
  echo "MySQL Snap smoke tests"

  PASS=$(grep MY-010454 /var/snap/mysql/current/log/error.log | awk '{ print $NF }')
  CMD="mysql -u root --password=\"${PASS}\""
  SNAP_VERSION=$(awk -F\' '/version/{print $2}' "${PROJECT_PATH}"/snap/snapcraft.yaml)
  ${CMD} -e "select @@version;" -E | grep "^@@version: ${SNAP_VERSION:-error}"

  echo "Ensure all tools are present"
  for tool in mysqldump mysqlimport mysqlshow mysqlslap mysqlcheck; do
    echo "Test ${tool}"
    mysql.${tool} --help &>/dev/null
  done

  echo "Test mysqladmin"
  # mysqladmin return 1 when called with `--help`, 127 if not found
  mysql.mysqladmin --help &>/dev/null || [ $? -eq 1 ] && exit 0 || exit 127
